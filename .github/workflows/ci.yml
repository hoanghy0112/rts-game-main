name: CI

on:
  pull_request:
    branches: ['**']
  push:
    branches: ['**']

permissions:
  contents: read
  pull-requests: write
  actions: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GODOT_VERSION: 4.6.3
  PROJECT_DIR: src
  GAME_NAME: RTSGame

jobs:
  static-checks:
    name: Lint, type check, and smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: true

      - name: Cache Godot imports
        uses: actions/cache@v4
        with:
          path: ${{ env.PROJECT_DIR }}/.godot
          key: godot-import-${{ runner.os }}-${{ env.GODOT_VERSION }}-${{ hashFiles('src/project.godot', 'src/export_presets.cfg', 'src/**/*.import') }}
          restore-keys: |
            godot-import-${{ runner.os }}-${{ env.GODOT_VERSION }}-

      - name: Install GDScript lint tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install gdtoolkit

      - name: Import project assets
        run: godot --headless --path "${PROJECT_DIR}" --import --quit-after 120

      - name: Lint GDScript
        run: |
          mapfile -t scripts < <(find "${PROJECT_DIR}" -name '*.gd' -type f | sort)
          if [ "${#scripts[@]}" -eq 0 ]; then
            echo "No GDScript files found; skipping lint."
            exit 0
          fi
          gdlint "${scripts[@]}"

      - name: Type check GDScript
        run: |
          mapfile -t scripts < <(find "${PROJECT_DIR}" -name '*.gd' -type f | sort)
          if [ "${#scripts[@]}" -eq 0 ]; then
            echo "No GDScript files found; skipping type checks."
            exit 0
          fi
          for script in "${scripts[@]}"; do
            resource_path="res://${script#${PROJECT_DIR}/}"
            godot --headless --path "${PROJECT_DIR}" --check-only --script "${resource_path}"
          done

      - name: Smoke test editor startup
        run: godot --headless --path "${PROJECT_DIR}" --editor --quit-after 30

  dev-builds:
    name: Build test (${{ matrix.target.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: static-checks

    strategy:
      fail-fast: false
      matrix:
        target:
          - name: Windows
            preset: Windows Desktop
            output: dist/windows/RTSGame-dev.exe
            package: dist/packages/RTSGame-dev-windows-x86_64.zip
            package_dir: dist/windows
          - name: Linux
            preset: Linux/X11
            output: dist/linux/RTSGame-dev.x86_64
            package: dist/packages/RTSGame-dev-linux-x86_64.tar.gz
            package_dir: dist/linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: true

      - name: Cache Godot imports
        uses: actions/cache@v4
        with:
          path: ${{ env.PROJECT_DIR }}/.godot
          key: godot-import-${{ runner.os }}-${{ env.GODOT_VERSION }}-${{ hashFiles('src/project.godot', 'src/export_presets.cfg', 'src/**/*.import') }}
          restore-keys: |
            godot-import-${{ runner.os }}-${{ env.GODOT_VERSION }}-

      - name: Export debug build
        run: |
          mkdir -p "$(dirname '${{ matrix.target.output }}')" dist/packages
          godot --headless --path "${PROJECT_DIR}" --export-debug "${{ matrix.target.preset }}" "../${{ matrix.target.output }}"

      - name: Smoke check build output
        run: |
          test -s "${{ matrix.target.output }}"
          if [ "${{ matrix.target.name }}" = "Linux" ]; then
            chmod +x "${{ matrix.target.output }}"
          fi

      - name: Package Windows dev build
        if: matrix.target.name == 'Windows'
        run: |
          cd "${{ matrix.target.package_dir }}"
          zip -9 -r "../../packages/RTSGame-dev-windows-x86_64.zip" .

      - name: Package Linux dev build
        if: matrix.target.name == 'Linux'
        run: |
          tar -C "${{ matrix.target.package_dir }}" -czf "${{ matrix.target.package }}" .

      - name: Upload PR/dev artifact
        uses: actions/upload-artifact@v4
        with:
          name: rts-game-dev-${{ matrix.target.name }}
          path: ${{ matrix.target.package }}
          retention-days: 14
          if-no-files-found: error

  attach-pr-artifacts:
    name: Attach dev builds to PR
    runs-on: ubuntu-latest
    needs: dev-builds
    if: github.event_name == 'pull_request'

    steps:
      - name: Comment artifact location on PR
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- rts-game-dev-builds -->';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `${marker}\nDev build artifacts are attached to this CI run:\n\n- Windows: \`rts-game-dev-Windows\`\n- Linux: \`rts-game-dev-Linux\`\n- Artifacts page: ${runUrl}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
            const existing = comments.data.find((comment) => comment.user.type === 'Bot' && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
